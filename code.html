<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL // DARK MODE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        /* สีหลักที่ใช้: ดำสนิท และ เขียวนีออน */
        :root {
            --neon-green: #39ff14;
            --dark-bg: #050505;
            --dim-text: #888888;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
        }

        /* พื้นหลังเลข 01 - ปรับความสว่างขึ้นมา (Opacity จาก 0.15 เป็น 0.4) */
        #binary-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4; 
        }

        .wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        /* กรอบ Terminal */
        .hud-terminal {
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.85); 
            border: 1px solid rgba(57, 255, 20, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(57, 255, 20, 0.05);
            backdrop-filter: blur(5px);
            padding: 30px;
            position: relative;
        }

        /* มุมกรอบนีออน */
        .hud-terminal::before, .hud-terminal::after {
            content: ''; position: absolute; width: 20px; height: 20px; border-color: var(--neon-green); border-style: solid;
            box-shadow: 0 0 10px var(--neon-green);
        }
        .hud-terminal::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .hud-terminal::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
        
        .hud-corner-tr { position: absolute; top: -1px; right: -1px; width: 20px; height: 20px; border-top: 2px solid var(--neon-green); border-right: 2px solid var(--neon-green); box-shadow: 4px -4px 10px -2px rgba(57, 255, 20, 0.6); }
        .hud-corner-bl { position: absolute; bottom: -1px; left: -1px; width: 20px; height: 20px; border-bottom: 2px solid var(--neon-green); border-left: 2px solid var(--neon-green); box-shadow: -4px 4px 10px -2px rgba(57, 255, 20, 0.6); }

        .hud-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(57, 255, 20, 0.4);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            color: var(--dim-text);
        }

        .neon-text {
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
        }

        .input-section {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            margin-bottom: 15px;
        }

        .prompt { margin-right: 15px; font-weight: bold; }

        input[type="text"] {
            background: transparent; border: none; color: #fff; font-family: inherit; font-size: 16px; width: 100%; outline: none; letter-spacing: 2px; text-transform: uppercase;
        }
        input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.2); letter-spacing: 1px; }

        .cyber-btn {
            background: rgba(57, 255, 20, 0.05); 
            color: var(--neon-green); 
            border: 1px solid var(--neon-green); 
            padding: 12px 20px; 
            font-family: inherit; 
            font-size: 14px; 
            font-weight: bold;
            letter-spacing: 2px; 
            cursor: pointer; 
            width: 100%; 
            text-transform: uppercase; 
            transition: all 0.2s ease; 
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2), inset 0 0 10px rgba(57, 255, 20, 0.1);
            text-shadow: 0 0 5px var(--neon-green);
        }
        .cyber-btn:hover { background: rgba(57, 255, 20, 0.2); box-shadow: 0 0 25px rgba(57, 255, 20, 0.6), inset 0 0 15px rgba(57, 255, 20, 0.3); color: #fff; }
        .cyber-btn:active { transform: scale(0.98); }
        .cyber-btn:disabled { border-color: #225511; color: #225511; box-shadow: none; text-shadow: none; cursor: not-allowed; }

        #console-output { margin-top: 25px; min-height: 60px; font-size: 14px; line-height: 1.5; }
        
        .log-line { color: var(--dim-text); }
        
        .success-box {
            margin-top: 15px; padding: 15px; border-left: 4px solid var(--neon-green); background: rgba(57, 255, 20, 0.08); color: #fff; word-wrap: break-word; font-size: 16px; 
            box-shadow: inset 20px 0 30px -20px rgba(57, 255, 20, 0.5); 
        }
        
        .error-line { color: #ff003c; text-shadow: 0 0 8px #ff003c; font-weight: bold; }
        
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="binary-canvas"></canvas>

    <div class="wrapper">
        <div class="hud-terminal">
            <div class="hud-corner-tr"></div>
            <div class="hud-corner-bl"></div>

            <div class="hud-header">
                <span>STATUS: <span class="neon-text">ENCRYPTED</span></span>
                <span>SEC_LVL: <span style="color:#ff003c;">MAXIMUM</span></span>
            </div>

            <div style="margin-bottom: 20px; font-size: 14px; letter-spacing: 1px;">
                <span class="neon-text">></span> AWAITING OVERRIDE CREDENTIALS <span class="blink">_</span>
            </div>

            <div class="input-section">
                <span class="prompt neon-text">SYS_KEY::</span>
                <input type="text" id="codeInput" autocomplete="off" spellcheck="false" placeholder="ENTER_HASH">
            </div>

            <button class="cyber-btn" id="btnExecute" onclick="executeHack()">[ INITIALIZE OVERRIDE ]</button>

            <div id="console-output"></div>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------
        // วางลิงก์ Google Apps Script ตรงนี้
        // ---------------------------------------------------------
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbydCKXuLKgtbASIJpbF4DLjqlOjv-fbAylxW6KSN_sICiTXYuQyKdjklEvl63_xPsvwjQ/exec";

        // --- ระบบ Binary Rain ---
        const canvas = document.getElementById('binary-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const binaryChars = '01';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for(let x = 0; x < columns; x++) { drops[x] = 1; }
        
        function drawRain() {
            // ปรับเงาหางตัวเลขให้จางลงนิดหน่อยเพื่อให้สว่างขึ้น
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // ปรับสีตัวเลขพื้นหลังให้สว่างเป็นสีเขียวกลางๆ ไม่มืดสนิทเหมือนเดิม
            ctx.fillStyle = '#008822'; 
            ctx.font = fontSize + 'px monospace';
            
            for(let i = 0; i < drops.length; i++) {
                const text = binaryChars.charAt(Math.floor(Math.random() * binaryChars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.98) { drops[i] = 0; }
                drops[i]++;
            }
        }
        setInterval(drawRain, 50);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        // --- ฟังก์ชันช่วยเหลือ ---
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // --- ฟังก์ชันแฮก ---
        async function executeHack() {
            const inputVal = document.getElementById("codeInput").value.trim();
            const outDiv = document.getElementById("console-output");
            const btn = document.getElementById("btnExecute");

            if (!inputVal) return;

            outDiv.innerHTML = "";
            btn.disabled = true;
            btn.innerText = "[ EXECUTING... ]";

            outDiv.innerHTML += `<div class="log-line">> INJECTING HASH: <span style="color:#fff;">[ ${inputVal} ]</span></div>`;
            await sleep(500);
            outDiv.innerHTML += `<div class="log-line">> BRUTEFORCING MAINFRAME...</div>`;
            await sleep(600);

            try {
                const response = await fetch(`${WEB_APP_URL}?code=${encodeURIComponent(inputVal)}`);
                const data = await response.json();

                await sleep(400);

                if (data.success) {
                    outDiv.innerHTML += `<div class="neon-text" style="font-weight: bold; margin-top: 10px;">> ACCESS GRANTED. FIREWALL DISABLED.</div>`;
                    outDiv.innerHTML += `
                        <div class="success-box">
                            <span style="font-size: 12px; color: var(--neon-green);">// DECRYPTED_DATA_FOUND</span><br>
                            ${data.answer}
                        </div>`;
                } else {
                    outDiv.innerHTML += `<div class="error-line" style="margin-top: 10px;">> [!] ACCESS DENIED. INTRUSION DETECTED.</div>`;
                    outDiv.innerHTML += `<div class="log-line">> TERMINATING CONNECTION...</div>`;
                }
            } catch (error) {
                outDiv.innerHTML += `<div class="error-line">> [!] CRITICAL: NETWORK FAILURE.</div>`;
            }

            btn.disabled = false;
            btn.innerText = "[ INITIALIZE OVERRIDE ]";
        }

        document.getElementById("codeInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                executeHack();
            }
        });
    </script>
</body>
</html>
